  <rect width="512" height="512" fill="#020617"/>

  <rect x="56" y="56" width="400" height="400" rx="120" fill="url(#halo)"/>
  <rect x="80" y="80" width="352" height="352" rx="96" fill="url(#tile)"/>
  <rect x="80" y="80" width="352" height="352" rx="96" fill="url(#glow)"/>

  <text
    x="256"
    y="340"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
