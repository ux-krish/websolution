<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="halo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Gradient halo (matches the spinning ring in the loader) -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#halo)"/>

  <!-- Dark tile (matches the brand mark) -->
  <rect x="6" y="6" width="52" height="52" rx="13" fill="url(#tile)"/>

  <!-- Subtle inner shimmer -->
  <rect x="6" y="6" width="52" height="52" rx="13" fill="url(#shimmer)"/>

  <!-- WS wordmark -->
  <text
    x="32"
    y="41"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-weight="900"
    font-size="26"
    letter-spacing="0.5"
    fill="#ffffff">WS</text>
</svg>
